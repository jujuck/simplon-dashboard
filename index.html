<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Simplon - WCS</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./favicon-32x32.webp"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Courier+Prime:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link href="./style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-top">
          <div class="header-spacer"></div>
          <div class="datetime-box">
            <span class="datetime-item">
              <span class="datetime-label">📅 DATE:</span>
              <span class="datetime-value" id="date"></span>
            </span>
            <span class="datetime-item">
              <span class="datetime-label">⏰ HEURE:</span>
              <span class="datetime-value" id="time"></span>
            </span>
          </div>
          <div class="header-actions">
            <button class="action-btn" id="open-recrutement" type="button">
              🧑‍💼 Espace Recrutement
            </button>
            <button class="action-btn" id="open-todo" type="button">
              ✅ To Do Liste
            </button>
          </div>
        </div>
      </div>
      <div class="main-grid">
        <!-- ZONE 1: OUTILS ET RESSOURCES -->
        <div class="zone">
          <div class="zone-title">Outils & Ressources</div>
          <div class="tools-grid"></div>
        </div>

        <!-- ZONE 2: ACCORDÉON PROMOS -->
        <div class="zone accordion-container">
          <div class="zone-title">Promos</div>
          <div class="accordion"></div>
        </div>
      </div>
    </div>

    <!-- MODALE : ESPACE RECRUTEMENT -->
    <div class="modal-overlay" id="modal-recrutement">
      <div class="modal-box">
        <div class="modal-header">
          <span class="modal-title">🧑‍💼 Espace Recrutement</span>
          <button
            class="modal-close"
            data-close="modal-recrutement"
            type="button"
          >
            ✕
          </button>
        </div>
        <div class="modal-body">
          <form id="form-prestataire" class="form-grid">
            <div class="form-field">
              <label for="p-nom">Nom</label>
              <input type="text" id="p-nom" required />
            </div>
            <div class="form-field">
              <label for="p-prenom">Prénom</label>
              <input type="text" id="p-prenom" required />
            </div>
            <div class="form-field">
              <label for="p-email">Email</label>
              <input type="email" id="p-email" required />
            </div>
            <div class="form-field">
              <label for="p-tel">Téléphone</label>
              <input type="tel" id="p-tel" />
            </div>
            <div class="form-field form-field-full">
              <label for="p-cursus">Cursus</label>
              <input type="text" id="p-cursus" required />
            </div>
            <button type="submit" class="btn-submit">
              + Ajouter à la liste d'attente
            </button>
          </form>
          <div id="liste-prestataires"></div>
        </div>
      </div>
    </div>

    <!-- MODALE : TO DO LISTE -->
    <div class="modal-overlay" id="modal-todo">
      <div class="modal-box">
        <div class="modal-header">
          <span class="modal-title">✅ To Do Liste</span>
          <button class="modal-close" data-close="modal-todo" type="button">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <form id="form-todo" class="form-grid">
            <div class="form-field form-field-full">
              <label for="t-nom">Nom de la tâche</label>
              <input type="text" id="t-nom" required />
            </div>
            <div class="form-field form-field-full">
              <label for="t-desc">Description courte</label>
              <input type="text" id="t-desc" />
            </div>
            <div class="form-field">
              <label for="t-priorite">Priorité</label>
              <select id="t-priorite">
                <option value="basse">Basse</option>
                <option value="moyenne" selected>Moyenne</option>
                <option value="haute">Haute</option>
              </select>
            </div>
            <div class="form-field">
              <label for="t-url">Lien URL</label>
              <input type="url" id="t-url" placeholder="https://..." />
            </div>
            <button type="submit" class="btn-submit">+ Ajouter la tâche</button>
          </form>
          <div id="liste-todos"></div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
